name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          cd ${{ github.workspace }}/.agents/tools/playwright
          npm install
          npx playwright install --with-deps chromium

      - name: Start Backend Server
        run: |
          cd ${{ github.workspace }}/backend
          composer install
          php -S localhost:8000 -t public &
          sleep 5

      - name: Start Frontend Server
        run: |
          cd ${{ github.workspace }}/frontend
          npm install
          npm run dev &
          sleep 10

      - name: Run Playwright Tests
        env:
          PLAYWRIGHT_REPORT_DIR: test-reports
        run: |
          cd ${{ github.workspace }}/.agents/tools/playwright
          node test_unified.js

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: ${{ github.workspace }}/.agents/tools/playwright/test-reports/
          retention-days: 30

      - name: Upload Playwright Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: ${{ github.workspace }}/.agents/tools/playwright/test-screenshots/
          retention-days: 7